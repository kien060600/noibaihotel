name: Deploy to VPS

on:
  push:
    branches:
      - main # Chạy luồng CI/CD khi có code push lên nhánh main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}       # IP của VPS (157.10.53.11)
          username: ${{ secrets.VPS_USER }}   # Tên user (thường là root)
          key: ${{ secrets.VPS_SSH_KEY }}     # Khối khóa bí mật (Private Key)
          port: 22
          script: |
            # Nạp biến môi trường để nhận diện lệnh npm và pm2
            export PATH=$PATH:/usr/local/bin:/usr/bin
            
            # Khai báo biến
            cd /root
            
            # Nếu chưa có thư mục code trên VPS thì tự động Clone về luôn (dùng token ẩn của Github)
            if [ ! -d "noibaihotel" ]; then
              git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git noibaihotel
            fi
            
            # Đi vào thư mục
            cd /root/noibaihotel
            
            # Lấy code mới nhất từ git
            git pull origin main
            
            # Cài đặt thư viện mới
            npm install
            
            # Build Next.js
            npm run build
            
            # Khởi động PM2 (nếu chưa có thì start mới, có rồi thì restart)
            pm2 restart noibaihotel || pm2 start npm --name "noibaihotel" -- start
